kind = "web"
previewPath = "/"
title = "NetMoneyTools"
version = "1.0.0"
id = "artifacts/netmoneytools"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25118

[services.development]
run = "pnpm --filter @workspace/netmoneytools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/netmoneytools", "run", "build" ]
publicDir = "artifacts/netmoneytools/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25118"
BASE_PATH = "/"
